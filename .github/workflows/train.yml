# ============================================================
# FILE: .github/workflows/train.yml
# KYA KARTA HAI: Jab bhi GitHub pe code push hota hai,
#                yeh automatically run hota hai:
#                - Dependencies install karta hai
#                - DVC pipeline chalaata hai (dvc repro)
#                - Models train hote hain
#                - Best model register hota hai
#
# SIMPLE MISAAL:
#   Jaise light switch dabao → automatically bulb jale.
#   Git push karo → automatically model train ho.
#
# GITHUB SECRETS SETUP KARNA HOGA:
#   GitHub Repo > Settings > Secrets > Actions > New secret
#   Add karo:
#     MLFLOW_TRACKING_URI
#     MLFLOW_TRACKING_USERNAME
#     MLFLOW_TRACKING_PASSWORD
#     DAGSHUB_TOKEN
# ============================================================

name: MLOps CI/CD Pipeline

# Kab chalega?
on:
  push:
    branches:
      - main        # main branch pe push hone pe
  workflow_dispatch: # ya manually GitHub se button click karo

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest    # GitHub ka free Linux computer use karo

    steps:
      # Step 1: Code checkout
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2: Python setup
      - name: Setup Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # Step 3: Libraries install
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Environment variables set karo (GitHub Secrets se)
      - name: Setup Environment Variables
        run: |
          echo "MLFLOW_TRACKING_URI=${{ secrets.MLFLOW_TRACKING_URI }}" >> $GITHUB_ENV
          echo "MLFLOW_TRACKING_USERNAME=${{ secrets.MLFLOW_TRACKING_USERNAME }}" >> $GITHUB_ENV
          echo "MLFLOW_TRACKING_PASSWORD=${{ secrets.MLFLOW_TRACKING_PASSWORD }}" >> $GITHUB_ENV

      # Step 5: DagsHub se data pull karo (DVC remote se)
      - name: DVC Pull Data
        env:
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          dvc remote modify origin --local auth basic
          dvc remote modify origin --local user ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          dvc remote modify origin --local password ${{ secrets.DAGSHUB_TOKEN }}
          dvc pull || echo "DVC pull failed, continuing..."

      # Step 6: DVC Pipeline chalao (saari stages)
      - name: Run DVC Pipeline
        run: |
          dvc repro

      # Step 7: DVC lock file update karo aur push karo
      - name: Commit Updated dvc.lock
        run: |
          git config --local user.email "github-actions@github.com"
          git config --local user.name "GitHub Actions"
          git add dvc.lock data_and_model/best_model_info.txt || true
          git diff --staged --quiet || git commit -m "CI: Updated dvc.lock after training"
          git push || true
